<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KÖNIG - Archive</title>
    <!-- 구글 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: #030406;
            color: #ffffff;
            font-family: 'Noto Sans KR', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .poster-container {
            width: 100%;
            max-width: 650px;
            background-image: 
                url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.06'/%3E%3C/svg%3E"),
                linear-gradient(180deg, #090e17 0%, #111827 50%, #05070a 100%);
            border: 1px solid rgba(121, 167, 255, 0.1);
            border-radius: 8px;
            padding: 40px 30px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8), inset 0 0 60px rgba(0, 0, 0, 0.5);
            min-height: 700px;
            display: flex;
            flex-direction: column;
        }

        /* 헤더 스타일 */
        .top-sub {
            font-family: 'Playfair Display', serif;
            font-size: 11px;
            letter-spacing: 3px;
            color: #79a7ff;
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
            position: relative;
            opacity: 0.7;
        }

        .admin-write-btn {
            position: absolute;
            right: 0;
            top: -2px;
            background: none;
            border: 1px solid rgba(121, 167, 255, 0.3);
            color: #79a7ff;
            padding: 3px 10px;
            font-size: 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .admin-write-btn:hover { color: #ffd700; border-color: #ffd700; }

        .main-header { position: relative; margin-bottom: 30px; text-align: center; }
        
        .header-meta { 
            font-family: 'Playfair Display', serif; 
            font-size: 11px; 
            color: #79a7ff; 
            margin-bottom: 8px; 
            letter-spacing: 2px; 
        }
        
        .header-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 3.5rem; 
            font-weight: 400; 
            color: #ffffff; 
            margin-bottom: 5px; 
            letter-spacing: -1px;
        }
        
        .header-cat { 
            font-family: 'Playfair Display', serif; 
            font-size: 1.1rem; 
            font-weight: 300; 
            color: #79a7ff; 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        /* 탭 네비게이션 */
        .tab-nav {
            display: flex;
            gap: 20px;
            border-bottom: 1px solid rgba(121, 167, 255, 0.2);
            padding-bottom: 12px;
            margin-bottom: 25px;
            justify-content: center;
        }

        .tab-btn {
            background: none;
            border: none;
            color: #6b7280;
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-style: italic;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover { color: #ffd700; }
        .tab-btn.active { color: #79a7ff; font-weight: bold; }

        .view-content { display: none; flex-grow: 1; }
        .view-content.active { display: block; }

        /* 포스트 리스트 스타일 */
        .post-list { list-style: none; }
        .post-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .post-item:hover { 
            border-color: rgba(121, 167, 255, 0.4); 
            background: rgba(255, 255, 255, 0.04);
        }

        .post-category { font-family: 'Playfair Display', serif; font-size: 10px; color: #ffd700; margin-bottom: 8px; letter-spacing: 1px; }
        .post-title { font-size: 1.1rem; color: #e0e0e0; margin-bottom: 6px; }
        .empty-message { text-align: center; color: #6b7280; font-style: italic; margin-top: 40px; }

        /* 입력 폼 및 버튼 */
        .write-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(121, 167, 255, 0.2);
            padding: 12px;
            color: #fff;
            margin-bottom: 15px;
            border-radius: 4px;
            font-family: inherit;
        }
        
        .write-input:focus {
            outline: none;
            border-color: #79a7ff;
        }

        .submit-btn {
            background: #79a7ff;
            color: #050505;
            border: none;
            padding: 8px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .submit-btn:hover { background: #ffd700; }
        
        /* 방명록 카드 */
        .message-card {
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-left: 3px solid #79a7ff;
            padding: 15px 40px 15px 15px; /* 우측 삭제 버튼 영역 확보 */
            margin-bottom: 12px;
            border-radius: 0 4px 4px 0;
            font-size: 0.95rem;
            line-height: 1.5;
            word-break: break-all;
        }

        /* 방명록 삭제 버튼 */
        .msg-delete-btn {
            position: absolute;
            top: 50%;
            right: 12px;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6b7280;
            font-size: 18px;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
            padding: 5px;
        }
        .msg-delete-btn:hover { color: #ff4d4d; }

        /* 이미지 반응형 스타일 */
        #detailImage { max-width: 100%; margin-top: 20px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div class="poster-container">
        <!-- 상단 서브 헤더 -->
        <div class="top-sub">
            @KINGIHKI 2026.05.06
            <button class="admin-write-btn" onclick="checkAdminAndWrite()">Write</button>
        </div>
        
        <!-- 메인 비주얼 헤더 -->
        <header class="main-header">
            <h1 class="header-title">ᴋᴏ̈ɴɪɢ</h1>
            <h2 class="header-cat">ANNOUNCEMENTS</h2>
        </header>

        <!-- 탭 네비게이션 -->
        <nav class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('home')" id="tab-home">Home</button>
            <button class="tab-btn" onclick="switchTab('notice')" id="tab-notice">Notice</button>
            <button class="tab-btn" onclick="switchTab('guestbook')" id="tab-guestbook">Guestbook</button>
        </nav>

        <!-- [뷰] Home 탭 -->
        <div id="view-home" class="view-content active">
            <ul class="post-list" id="homePostList"></ul>
        </div>
        
        <!-- [뷰] Notice 탭 -->
        <div id="view-notice" class="view-content">
            <ul class="post-list" id="noticePostList"></ul>
        </div>
        
        <!-- [뷰] Guestbook 탭 -->
        <div id="view-guestbook" class="view-content">
            <form class="anon-form" id="anonForm">
                <textarea class="write-input" style="height: 100px;" id="anonInput" placeholder="자유롭게 흔적을 남겨주세요." required></textarea>
                <div style="text-align: right; margin-bottom: 20px;">
                    <button type="submit" class="submit-btn">등록</button>
                </div>
            </form>
            <div class="message-board" id="messageBoard"></div>
        </div>

        <!-- [뷰] 글쓰기/수정 영역 -->
        <div id="view-write" class="view-content">
            <h3 id="writeViewTitle" style="font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #79a7ff; margin-bottom: 20px;">Create New Post</h3>
            
            <label style="font-size: 12px; color: #79a7ff; display: block; margin-bottom: 5px;">Category</label>
            <select id="categoryInput" class="write-input">
                <option value="Home">Home</option>
                <option value="Notice">Notice</option>
            </select>
            
            <input type="text" id="titleInput" class="write-input" placeholder="제목을 입력하세요.">
            <textarea id="contentInput" class="write-input" style="height: 180px; resize: none;" placeholder="내용을 입력하세요."></textarea>
            
            <label style="font-size: 12px; color: #79a7ff; display: block; margin-bottom: 5px;">Attachment Image</label>
            <input type="file" id="fileInput" class="write-input" accept="image/*">
            
            <div style="text-align: right; margin-top: 10px;">
                <button onclick="cancelWrite()" style="background:none; border:1px solid rgba(255,255,255,0.2); color:#aaa; padding:8px 20px; border-radius:4px; cursor:pointer; margin-right: 10px;">취소</button>
                <button onclick="savePost()" class="submit-btn">저장</button>
            </div>
        </div>

        <!-- [뷰] 상세 보기 영역 -->
        <div id="view-detail" class="view-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <button onclick="goBackFromDetail()" style="background:none; border:1px solid rgba(121, 167, 255, 0.3); color:#79a7ff; padding: 6px 15px; border-radius: 4px; cursor:pointer; font-size: 12px;">← 목록으로</button>
                <div id="adminDetailActions">
                    <button onclick="triggerEdit()" style="background:none; border:1px solid rgba(255, 215, 0, 0.3); color:#ffd700; padding: 6px 12px; border-radius: 4px; cursor:pointer; font-size: 12px; margin-right: 5px;">수정</button>
                    <button onclick="triggerDelete()" style="background:none; border:1px solid rgba(255, 77, 77, 0.3); color:#ff4d4d; padding: 6px 12px; border-radius: 4px; cursor:pointer; font-size: 12px;">삭제</button>
                </div>
            </div>
            
            <div style="border-bottom: 1px solid rgba(121, 167, 255, 0.1); padding-bottom: 15px; margin-bottom: 20px;">
                <div id="dCategory" style="font-family: 'Playfair Display', serif; font-size: 11px; color: #ffd700; text-transform: uppercase; letter-spacing: 1px;"></div>
                <h2 id="dTitle" style="font-size: 1.8rem; font-weight: 400; margin-top: 5px; color: #ffffff; line-height: 1.3;"></h2>
            </div>
            
            <p id="dContent" style="font-size: 1rem; line-height: 1.7; color: #e0e0e0; white-space: pre-wrap; word-break: break-all;"></p>
            <div id="dImage"></div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = "siwoo031789.";
        
        // 데이터 로드
        let posts = JSON.parse(localStorage.getItem('posts_v4')) || [];
        let messages = JSON.parse(localStorage.getItem('msgs_v3')) || [];
        
        let previousTabId = 'home'; 
        let currentDetailIndex = null; 
        let editingIndex = null;       

        function savePosts() { localStorage.setItem('posts_v4', JSON.stringify(posts)); }
        function saveMessages() { localStorage.setItem('msgs_v3', JSON.stringify(messages)); }

        // 매번 확실하게 비밀번호를 묻는 검증 로직
        function checkAdmin() {
            const pw = prompt("관리자 비밀번호를 입력하세요:");
            if (pw === ADMIN_PASSWORD) {
                return true;
            }
            alert("비밀번호가 일치하지 않습니다.");
            return false;
        }

        // 포스트 렌더링
        function renderPosts() {
            const homeList = document.getElementById('homePostList');
            const noticeList = document.getElementById('noticePostList');
            
            homeList.innerHTML = '';
            noticeList.innerHTML = '';

            let homeCount = 0;
            let noticeCount = 0;

            posts.forEach((p, idx) => {
                const itemHtml = `
                    <li class="post-item" onclick="openDetail(${idx})">
                        <div class="post-category">${p.category || 'HOME'}</div>
                        <div class="post-title">${p.title}</div>
                    </li>
                `;
                
                const categoryLower = (p.category || 'Home').toLowerCase();
                if (categoryLower === 'home') {
                    homeList.innerHTML += itemHtml;
                    homeCount++;
                } else if (categoryLower === 'notice') {
                    noticeList.innerHTML += itemHtml;
                    noticeCount++;
                }
            });

            if (homeCount === 0) {
                homeList.innerHTML = '<p class="empty-message">No posts yet.</p>';
            }
            if (noticeCount === 0) {
                noticeList.innerHTML = '<p class="empty-message">No notices yet.</p>';
            }
        }

        // 방명록 렌더링 (삭제 버튼 포함)
        function renderMessages() {
            const board = document.getElementById('messageBoard');
            board.innerHTML = messages.length === 0 ? '<p class="empty-message">첫 번째 메시지를 남겨보세요.</p>' : '';
            messages.forEach((m, idx) => {
                board.innerHTML += `
                    <div class="message-card">
                        ${m.text}
                        <button class="msg-delete-btn" onclick="deleteMessage(${idx})" title="삭제">&times;</button>
                    </div>`;
            });
        }

        // 탭 전환 (버그 유발 코드 완벽 수정!)
        function switchTab(id) {
            previousTabId = id; 
            
            // 모든 뷰 영역 숨기고 선택한 영역만 보이게 처리
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById(`view-${id}`).classList.add('active');

            // 탭 버튼 스타일 제어
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.getElementById(`tab-${id}`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        // 글쓰기 전용 버튼 클릭 트리거 (비밀번호 확인 필수)
        function checkAdminAndWrite() {
            if (checkAdmin()) {
                editingIndex = null; 
                resetWriteForm();
                
                document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
                document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
                document.getElementById('view-write').classList.add('active');
            }
        }

        // 폼 인풋값 리셋
        function resetWriteForm() {
            document.getElementById('titleInput').value = '';
            document.getElementById('contentInput').value = '';
            document.getElementById('fileInput').value = '';
            document.getElementById('writeViewTitle').innerText = "Create New Post";
        }

        // 글쓰기 취소
        function cancelWrite() {
            resetWriteForm();
            if (editingIndex !== null) {
                openDetail(editingIndex); 
                editingIndex = null;
            } else {
                switchTab(previousTabId); 
            }
        }

        // 포스트 저장
        function savePost() {
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();
            const category = document.getElementById('categoryInput').value;
            const file = document.getElementById('fileInput').files[0];

            if (!title || !content) {
                alert("제목과 내용을 모두 작성해주세요.");
                return;
            }

            const completeAndSave = (imgData) => {
                if (editingIndex !== null) {
                    posts[editingIndex].title = title;
                    posts[editingIndex].content = content;
                    posts[editingIndex].category = category;
                    if (imgData !== undefined) {
                        posts[editingIndex].img = imgData; 
                    }
                    editingIndex = null;
                } else {
                    posts.unshift({
                        title: title,
                        content: content,
                        category: category,
                        img: imgData || null
                    });
                }
                
                savePosts();
                resetWriteForm();
                renderPosts();
                switchTab(category.toLowerCase());
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    completeAndSave(e.target.result);
                };
                reader.readAsDataURL(file);
            } else {
                completeAndSave(editingIndex !== null ? undefined : null);
            }
        }

        // 상세 글 보기
        function openDetail(index) {
            const post = posts[index];
            if (!post) return;

            currentDetailIndex = index;

            document.getElementById('dCategory').innerText = post.category || 'HOME';
            document.getElementById('dTitle').innerText = post.title;
            document.getElementById('dContent').innerText = post.content;
            document.getElementById('dImage').innerHTML = post.img ? `<img src="${post.img}" id="detailImage">` : '';
            
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById('view-detail').classList.add('active');
        }

        // 상세페이지에서 돌아가기
        function goBackFromDetail() {
            switchTab(previousTabId);
        }

        // 수정 기능 트리거 (비밀번호 확인 필수)
        function triggerEdit() {
            if (currentDetailIndex === null) return;
            if (!checkAdmin()) return;

            const post = posts[currentDetailIndex];
            editingIndex = currentDetailIndex;

            document.getElementById('categoryInput').value = post.category || 'Home';
            document.getElementById('titleInput').value = post.title;
            document.getElementById('contentInput').value = post.content;
            document.getElementById('writeViewTitle').innerText = "Edit Post";

            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.getElementById('view-write').classList.add('active');
        }

        // 글 삭제 트리거 (비밀번호 확인 필수)
        function triggerDelete() {
            if (currentDetailIndex === null) return;
            if (!checkAdmin()) return;

            if (confirm("정말 이 글을 삭제하시겠습니까?")) {
                posts.splice(currentDetailIndex, 1);
                savePosts();
                renderPosts();
                goBackFromDetail();
            }
        }

        // 익명 방명록 한 항목 삭제 (비밀번호 확인 필수)
        function deleteMessage(index) {
            if (!checkAdmin()) return;

            if (confirm("이 방명록 글을 삭제하시겠습니까?")) {
                messages.splice(index, 1);
                saveMessages();
                renderMessages();
            }
        }

        // 익명 방명록 등록
        document.getElementById('anonForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const textInput = document.getElementById('anonInput');
            const text = textInput.value.trim();
            
            if (text) {
                messages.unshift({ text: text });
                saveMessages();
                renderMessages();
                textInput.value = '';
            }
        });

        // 초기 화면 구동
        renderPosts();
        renderMessages();
    </script>
</body>
</html>
